<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{Site Name} — Before / After Preview</title>
  <link rel="stylesheet" href="tokens.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans, system-ui, sans-serif);
      background: #111;
      color: #fff;
    }
    .preview-banner {
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: #e85d04;
      color: #000;
      text-align: center;
    }
    .compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 80vh;
    }
    @media (max-width: 768px) {
      .compare { grid-template-columns: 1fr; }
    }
    .panel {
      padding: 1.5rem;
      overflow: auto;
      border-right: 1px solid #333;
    }
    .panel:last-child { border-right: none; }
    .panel-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.6;
      margin-bottom: 1rem;
    }
    .panel--before { background: var(--color-background-before, #0a0a0a); }
    .panel--after { background: var(--color-background, #0a0a0a); }
    iframe {
      width: 100%;
      height: 70vh;
      border: 1px solid #333;
      background: #000;
    }
    .legend {
      padding: 1rem;
      font-size: 0.8rem;
      color: #aaa;
      border-top: 1px solid #333;
    }
    .legend ul { margin-top: 0.5rem; padding-left: 1.25rem; }
  </style>
</head>
<body>
  <div class="preview-banner">Proposal preview — before vs after — {rec-ids}</div>

  <div class="compare">
    <section class="panel panel--before">
      <p class="panel-label">Before (baseline)</p>
      <iframe src="before.html" title="Before preview"></iframe>
    </section>
    <section class="panel panel--after">
      <p class="panel-label">After (proposed P0/P1)</p>
      <iframe src="after.html" title="After preview"></iframe>
    </section>
  </div>

  <div class="legend">
    <strong>Changes in this preview</strong>
    <ul>
      <!-- <li>P0-1 — {title}</li> -->
    </ul>
  </div>
</body>
</html>
